{% extends "layout.html" %}

{% block content %}

<div class="card">
    <div class="card-header">
        <h2>🔐 Connexion Administrateur</h2>
    </div>
    
    <div class="card-body">
        <form id="loginForm">
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="Nom d'utilisateur ou Email"
                   required
                   style="margin-bottom:15px;">
            
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Mot de passe"
                   required>
            
            <button type="submit">
                🔐 Se connecter
            </button>
        </form>
        
        <div style="text-align:center; margin-top:20px;">
            <a href="#" onclick="openForgotModal()" style="color:#667eea; text-decoration:none; font-size:14px;">
                Mot de passe oublié ?
            </a>
        </div>
        
        <div style="text-align:center; margin-top:15px; padding-top:15px; border-top:1px solid #eee;">
            <a href="/admin/register" style="color:#667eea; text-decoration:none;">
                📝 Créer un compte
            </a>
        </div>
    </div>
</div>

<!-- Modal pour mot de passe oublié -->
<div id="forgotModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; border-radius:20px; width:90%; max-width:400px; padding:25px;">
        <h3 style="margin-bottom:15px;">🔑 Réinitialisation</h3>
        <p style="margin-bottom:15px;">Entrez votre email pour recevoir un lien de réinitialisation.</p>
        <input type="email" id="resetEmail" placeholder="votre@email.com" style="width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:10px; margin-bottom:15px;">
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button onclick="closeForgotModal()" style="padding:10px 20px; background:#6c757d; color:white; border:none; border-radius:8px; cursor:pointer; width:auto;">Annuler</button>
            <button onclick="sendResetLink()" style="padding:10px 20px; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; border:none; border-radius:8px; cursor:pointer; width:auto;">Envoyer</button>
        </div>
    </div>
</div>

<style>
    .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        z-index: 1100;
        animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    .notification.success { background-color: #28a745; }
    .notification.error { background-color: #dc3545; }
    .notification.info { background-color: #17a2b8; }
</style>

<script>
    const loginForm = document.getElementById('loginForm');
    const forgotModal = document.getElementById('forgotModal');
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 4000);
    }
    
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) {
            showNotification('Veuillez remplir tous les champs', 'error');
            return;
        }
        
        try {
            const response = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showNotification('✅ Connexion réussie ! Redirection...', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                showNotification('❌ ' + data.error, 'error');
            }
        } catch (error) {
            showNotification('❌ Erreur de connexion', 'error');
        }
    });
    
    function openForgotModal() {
        forgotModal.style.display = 'flex';
        document.getElementById('resetEmail').value = '';
    }
    
    function closeForgotModal() {
        forgotModal.style.display = 'none';
    }
    
    async function sendResetLink() {
        const email = document.getElementById('resetEmail').value.trim();
        
        if (!email) {
            showNotification('Veuillez entrer votre email', 'error');
            return;
        }
        
        try {
            const response = await fetch('/admin/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showNotification('✅ ' + data.message, 'success');
                closeForgotModal();
            } else {
                showNotification('❌ ' + data.error, 'error');
            }
        } catch (error) {
            showNotification('❌ Erreur lors de l\'envoi', 'error');
        }
    }
    
    forgotModal.addEventListener('click', function(e) {
        if (e.target === forgotModal) closeForgotModal();
    });
</script>

{% endblock %}
