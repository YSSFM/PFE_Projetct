<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur 404 - RecoJY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .error-container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 20px;
        }
        
        .error-code {
            font-size: 100px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .error-message {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .error-description {
            color: #666;
            margin-bottom: 30px;
        }
        
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.3s ease;
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">Page non trouvée</div>
        <div class="error-description">
            Oups ! La page que vous recherchez n'existe pas ou a été déplacée.
        </div>
        <a href="/" class="btn-home">🏠 Retour à l'accueil</a>
    </div>
</body>
</html>
